# Deprecated compatibility copy.
# Canonical augmentation config: configs/aug/strong.yaml
size: [384, 384]
train:
  - name: RandomResizedCrop
    height: 384
    width: 384
    scale: [0.7, 1.0]
    ratio: [0.9, 1.1]
    p: 1.0
  - name: Perspective
    scale: 0.05
    p: 0.3
  - name: CoarseDropout
    max_holes: 4
    max_height: 48
    max_width: 48
    min_holes: 1
    min_height: 16
    min_width: 16
    p: 0.4
  - name: ColorJitter
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.05
    p: 0.4
normalize:
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
