experiment:
  name: d1_resnet18_mahalanobis_v1
  seed: 42
  status: implemented_baseline

data:
  normal_train_manifest: data/manifests/D1_anomaly_train_normal.csv
  validation_manifest: data/manifests/D1_anomaly_val_mixed.csv
  test_manifest: data/manifests/D1_anomaly_test_mixed.csv
  image_path_column: image_path
  target_column: target
  normal_label: 0
  anomaly_label: 1
  image_size: [224, 224]
  batch_size: 32
  num_workers: 0
  device: auto

feature_extractor:
  backbone: resnet18
  pretrained: true
  weights_path: null  # Optional local .pth path for offline runs when torchvision cannot download weights.
  freeze: true
  layer: avgpool

embedding:
  method: pooled_penultimate
  normalize: true

scoring:
  method: mahalanobis
  regularization: 0.001
  knn_k: 5
  optional_secondary: knn

threshold_policy:
  selection_split: validation
  primary: maximize_anomaly_recall_subject_to_normal_fpr
  max_normal_fpr: 0.10
  fallback: maximize_f1
  notes: "Threshold is selected on validation only and applied once to test."

outputs:
  run_dir: artifacts/anomaly/d1_resnet18_mahalanobis_v1
  report: reports/anomaly/anomaly_baseline_report.md
