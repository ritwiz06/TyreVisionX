collection:
  status: manual_provider_scaffold
  policy: research_candidate_data_only
  query_catalog_path: configs/web_collection/query_catalog.yaml
  provider_sources_path: configs/web_collection/provider_sources.yaml
  approved_modes:
    - manual_csv_json
    - approved_provider_api
    - manual_google_discovery_csv

product:
  type: tyre
  source_dataset: web_candidate

provider:
  type: manual_csv_json
  manual_input_path: data/external/manual_web_urls.csv
  api_key_env: GOOGLE_CUSTOM_SEARCH_API_KEY
  engine_id_env: GOOGLE_CUSTOM_SEARCH_ENGINE_ID
  google_custom_search:
    status: future_placeholder
    api_key_env: GOOGLE_CUSTOM_SEARCH_API_KEY
    engine_id_env: GOOGLE_CUSTOM_SEARCH_ENGINE_ID
    note: "Use the official JSON API only. Do not scrape Google HTML."
  manual_google_discovery:
    status: ready_manual_csv
    template_path: data/external/manual_candidate_urls/manual_google_discovery_template.csv
    note: "Researcher-prepared CSV only. Do not scrape Google HTML."

download:
  enabled: false
  timeout_seconds: 20
  user_agent: TyreVisionX-research-curation/0.1

storage:
  raw_image_dir: data/external/web_raw
  metadata_csv_path: data/interim/web_collection_metadata.csv
  curated_output_dir: data/interim/web_curated_candidates
  review_queue_csv_path: data/interim/web_curated_candidates/review_queue.csv
  planning_target_raw_images: [12000, 15000]
  planning_target_curated_likely_good: [4000, 7000]
  max_project_budget_gb: 100

deduplication:
  enabled: true
  perceptual_hash: true
  hash_distance_threshold: 6
  exact_file_hash: true

quality_filtering:
  enabled: true
  min_width: 224
  min_height: 224
  max_aspect_ratio: 4.0
  max_file_size_bytes: 25000000
  allowed_extensions: [.jpg, .jpeg, .png, .webp]
  reject_blurry_images: true
  blur_laplacian_threshold: 30.0

anomaly_triage:
  enabled: false
  artifact_dir: artifacts/anomaly/d1_resnet18_mahalanobis_v1
  score_column: anomaly_score
  likely_normal_max_score: null
  likely_anomalous_min_score: null
  uncertain_between: true
  review_required: true

review:
  required_before_training_use: true
  queue_csv_path: data/interim/web_curated_candidates/review_queue.csv
  allowed_statuses:
    - pending_review
    - approved_likely_normal
    - rejected_irrelevant
    - rejected_low_quality
    - rejected_likely_defect
    - uncertain_holdout
  notes: "Anomaly filtering can triage likely-good images, but it must not assign ground truth automatically."
